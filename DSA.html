{id:1,lc:1,level:"easy",title:"Two Sum",tags:["Array","HashMap"],lcSlug:"two-sum",
approach:"Use HashMap to store complement. For each element, check if (target-num) exists.",
steps:["Create empty HashMap.","For each num: if (target-num) in map → return [map[target-num], i].","Else: map[num] = i."],
time:"O(n)",space:"O(n)",
python:`def twoSum(nums, target):
    seen = {}
    for i, num in enumerate(nums):
        comp = target - num
        if comp in seen:
            return [seen[comp], i]
        seen[num] = i`,
java:`public int[] twoSum(int[] nums, int target) {
    Map<Integer,Integer> map = new HashMap<>();
    for (int i = 0; i < nums.length; i++) {
        int comp = target - nums[i];
        if (map.containsKey(comp))
            return new int[]{map.get(comp), i};
        map.put(nums[i], i);
    }
    return new int[]{};
}`,
cpp:`vector<int> twoSum(vector<int>& nums, int target) {
    unordered_map<int,int> seen;
    for (int i = 0; i < nums.size(); i++) {
        int comp = target - nums[i];
        if (seen.count(comp))
            return {seen[comp], i};
        seen[nums[i]] = i;
    }
    return {};
}`},
 
{id:2,lc:9,level:"easy",title:"Palindrome Number",tags:["Math"],lcSlug:"palindrome-number",
approach:"Reverse second half of number, compare with first half.",
steps:["Negative numbers → false. Numbers ending in 0 (except 0) → false.","Reverse digits until reversedHalf >= x.","Compare x == reversedHalf OR x == reversedHalf/10."],
time:"O(log n)",space:"O(1)",
python:`def isPalindrome(x):
    if x < 0 or (x % 10 == 0 and x != 0):
        return False
    rev = 0
    while x > rev:
        rev = rev * 10 + x % 10
        x //= 10
    return x == rev or x == rev // 10`,
java:`public boolean isPalindrome(int x) {
    if (x < 0 || (x % 10 == 0 && x != 0)) return false;
    int rev = 0;
    while (x > rev) {
        rev = rev * 10 + x % 10;
        x /= 10;
    }
    return x == rev || x == rev / 10;
}`,
cpp:`bool isPalindrome(int x) {
    if (x < 0 || (x % 10 == 0 && x != 0)) return false;
    int rev = 0;
    while (x > rev) {
        rev = rev * 10 + x % 10;
        x /= 10;
    }
    return x == rev || x == rev / 10;
}`},
 
{id:3,lc:20,level:"easy",title:"Valid Parentheses",tags:["Stack","String"],lcSlug:"valid-parentheses",
approach:"Stack: push opening brackets, pop and verify on closing brackets.",
steps:["For each char: if opening → push to stack.","If closing: check if stack top matches. If not → return false.","At end: stack must be empty."],
time:"O(n)",space:"O(n)",
python:`def isValid(s):
    stack, match = [], {')':'(', ']':'[', '}':'{'}
    for c in s:
        if c in match:
            if not stack or stack[-1] != match[c]:
                return False
            stack.pop()
        else:
            stack.append(c)
    return not stack`,
java:`public boolean isValid(String s) {
    Deque<Character> stack = new ArrayDeque<>();
    for (char c : s.toCharArray()) {
        if (c=='(' || c=='[' || c=='{') stack.push(c);
        else if (stack.isEmpty()) return false;
        else if (c==')' && stack.pop()!='(') return false;
        else if (c==']' && stack.pop()!='[') return false;
        else if (c=='}' && stack.pop()!='{') return false;
    }
    return stack.isEmpty();
}`,
cpp:`bool isValid(string s) {
    stack<char> st;
    for (char c : s) {
        if (c=='('||c=='['||c=='{') st.push(c);
        else if (st.empty()) return false;
        else if (c==')' && st.top()!='(') return false;
        else if (c==']' && st.top()!='[') return false;
        else if (c=='}' && st.top()!='{') return false;
        else st.pop();
    }
    return st.empty();
}`},
 
{id:4,lc:21,level:"easy",title:"Merge Two Sorted Lists",tags:["Linked List","Recursion"],lcSlug:"merge-two-sorted-lists",
approach:"Recursively compare heads and link the smaller one.",
steps:["If either list null → return other list.","Compare l1.val and l2.val.","Attach smaller node, recurse on its next."],
time:"O(m+n)",space:"O(m+n)",
python:`def mergeTwoLists(l1, l2):
    if not l1: return l2
    if not l2: return l1
    if l1.val <= l2.val:
        l1.next = mergeTwoLists(l1.next, l2)
        return l1
    else:
        l2.next = mergeTwoLists(l1, l2.next)
        return l2`,
java:`public ListNode mergeTwoLists(ListNode l1, ListNode l2) {
    if (l1 == null) return l2;
    if (l2 == null) return l1;
    if (l1.val <= l2.val) {
        l1.next = mergeTwoLists(l1.next, l2);
        return l1;
    }
    l2.next = mergeTwoLists(l1, l2.next);
    return l2;
}`,
cpp:`ListNode* mergeTwoLists(ListNode* l1, ListNode* l2) {
    if (!l1) return l2;
    if (!l2) return l1;
    if (l1->val <= l2->val) {
        l1->next = mergeTwoLists(l1->next, l2);
        return l1;
    }
    l2->next = mergeTwoLists(l1, l2->next);
    return l2;
}`},

{id:7,lc:121,level:"easy",title:"Best Time to Buy and Sell Stock",tags:["Array","Greedy"],lcSlug:"best-time-to-buy-and-sell-stock",
approach:"Track min price seen. Compute profit at each step.",

python:`def maxProfit(prices):

{id:111,lc:33,level:"medium",title:"Search in Rotated Sorted Array",tags:["Array","Binary Search"],lcSlug:"search-in-rotated-sorted-array",approach:"Determine which half is sorted, decide where target lies.",steps:["lo=0,hi=n-1.","If left half sorted (nums[lo]<=nums[mid]): if target in range→hi=mid-1 else lo=mid+1.","Else right half sorted: similar check."],time:"O(log n)",space:"O(1)",python:`def search(nums,target):\n    lo,hi=0,len(nums)-1\n    while lo<=hi:\n        mid=(lo+hi)//2\n        if nums[mid]==target: return mid\n        if nums[lo]<=nums[mid]:\n            if nums[lo]<=target<nums[mid]: hi=mid-1\n            else: lo=mid+1\n        else:\n            if nums[mid]<target<=nums[hi]: lo=mid+1\n            else: hi=mid-1\n    return -1`,java:`public int search(int[]nums,int target){\n    int lo=0,hi=nums.length-1;\n    while(lo<=hi){int mid=(lo+hi)/2;if(nums[mid]==target)return mid;\n    if(nums[lo]<=nums[mid]){if(nums[lo]<=target&&target<nums[mid])hi=mid-1;else lo=mid+1;}\n    else{if(nums[mid]<target&&target<=nums[hi])lo=mid+1;else hi=mid-1;}}\n    return -1;\n}`,cpp:`int search(vector<int>&nums,int target){\n    int lo=0,hi=nums.size()-1;\n    while(lo<=hi){int mid=(lo+hi)/2;if(nums[mid]==target)return mid;\n    if(nums[lo]<=nums[mid]){if(nums[lo]<=target&&target<nums[mid])hi=mid-1;else lo=mid+1;}\n    else{if(nums[mid]<target&&target<=nums[hi])lo=mid+1;else hi=mid-1;}}\n    return -1;\n}`},
{id:112,lc:146,level:"medium",title:"LRU Cache",tags:["Design","HashMap","Linked List"],lcSlug:"lru-cache",approach:"HashMap + doubly linked list: O(1) get and put.",steps:["HashMap maps key→node in DLL.","get: move node to front. put: add to front.","If over capacity: evict from back."],time:"O(1)",space:"O(capacity)",python:`class LRUCache:\n    def __init__(self,cap):\n        self.cap=cap; self.cache={}\n        self.head=Node(0,0); self.tail=Node(0,0)\n        self.head.next=self.tail; self.tail.prev=self.head\n    # Full implementation needs Node class with prev/next\n    # remove(node), add_front(node) helpers`,java:`// Use LinkedHashMap for clean O(1) LRU:\nclass LRUCache extends LinkedHashMap<Integer,Integer>{\n    int cap;\n    LRUCache(int c){super(c,0.75f,true);cap=c;}\n    public int get(int k){return super.getOrDefault(k,-1);}\n    public void put(int k,int v){super.put(k,v);}\n    protected boolean removeEldestEntry(Map.Entry e){return size()>cap;}\n}`,cpp:`class LRUCache{\n    int cap; list<pair<int,int>> dl;\n    unordered_map<int,list<pair<int,int>>::iterator> mp;\npublic:\n    LRUCache(int c):cap(c){}\n    int get(int k){if(!mp.count(k))return -1;dl.splice(dl.begin(),dl,mp[k]);return mp[k]->second;}\n    void put(int k,int v){if(mp.count(k))dl.erase(mp[k]);dl.push_front({k,v});mp[k]=dl.begin();if(dl.size()>cap){mp.erase(dl.back().first);dl.pop_back();}}\n};`},
];
Q.push(...medExtra);
 
// Hard extras
const hardExtra=[
{id:141,lc:32,level:"hard",title:"Longest Valid Parentheses",tags:["String","Stack","DP"],lcSlug:"longest-valid-parentheses",approach:"Stack stores indices; length = current index - stack top.",steps:["Push -1 as base.","For '(': push index. For ')': pop. If stack empty→push i. Else→maxLen=i-stack.top.","Track maximum."],time:"O(n)",space:"O(n)",python:`def longestValidParentheses(s):\n    stack,mx=[-1],0\n    for i,c in enumerate(s):\n        if c=='(': stack.append(i)\n        else:\n            stack.pop()\n            if not stack: stack.append(i)\n            else: mx=max(mx,i-stack[-1])\n    return mx`,java:`public int longestValidParentheses(String s){\n    Deque<Integer>st=new ArrayDeque<>();st.push(-1);int mx=0;\n    for(int i=0;i<s.length();i++){\n        if(s.charAt(i)=='(')st.push(i);\n        else{st.pop();if(st.isEmpty())st.push(i);else mx=Math.max(mx,i-st.peek());}\n    }\n    return mx;\n}`,cpp:`int longestValidParentheses(string s){\n    stack<int>st;st.push(-1);int mx=0;\n    for(int i=0;i<s.size();i++){\n        if(s[i]=='(')st.push(i);\n        else{st.pop();if(st.empty())st.push(i);else mx=max(mx,i-st.top());}\n    }\n    return mx;\n}`},
{id:142,lc:72,level:"hard",title:"Edit Distance",tags:["String","DP"],lcSlug:"edit-distance",approach:"dp[i][j] = min ops to convert word1[0..i] to word2[0..j].",steps:["Base: dp[i][0]=i, dp[0][j]=j.","If chars equal: dp[i][j]=dp[i-1][j-1].","Else: dp[i][j]=1+min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1])."],time:"O(m×n)",space:"O(m×n)",python:`def minDistance(w1,w2):\n    m,n=len(w1),len(w2)\n    dp=[[0]*(n+1) for _ in range(m+1)]\n    for i in range(m+1): dp[i][0]=i\n    for j in range(n+1): dp[0][j]=j\n    for i in range(1,m+1):\n        for j in range(1,n+1):\n            if w1[i-1]==w2[j-1]: dp[i][j]=dp[i-1][j-1]\n            else: dp[i][j]=1+min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1])\n    return dp[m][n]`,java:`public int minDistance(String w1,String w2){\n    int m=w1.length(),n=w2.length();\n    int[][]dp=new int[m+1][n+1];\n    for(int i=0;i<=m;i++)dp[i][0]=i;\n    for(int j=0;j<=n;j++)dp[0][j]=j;\n    for(int i=1;i<=m;i++) for(int j=1;j<=n;j++)\n        dp[i][j]=w1.charAt(i-1)==w2.charAt(j-1)?dp[i-1][j-1]:1+Math.min(dp[i-1][j-1],Math.min(dp[i-1][j],dp[i][j-1]));\n    return dp[m][n];\n}`,cpp:`int minDistance(string w1,string w2){\n    int m=w1.size(),n=w2.size();\n    vector<vector<int>>dp(m+1,vector<int>(n+1));\n    for(int i=0;i<=m;i++)dp[i][0]=i;\n    for(int j=0;j<=n;j++)dp[0][j]=j;\n    for(int i=1;i<=m;i++) for(int j=1;j<=n;j++)\n        dp[i][j]=w1[i-1]==w2[j-1]?dp[i-1][j-1]:1+min({dp[i-1][j-1],dp[i-1][j],dp[i][j-1]});\n    return dp[m][n];\n}`},
];
Q.push(...hardExtra);
 
// ─── State ────────────────────────────────────────────────────────────────────
let solved = JSON.parse(localStorage.getItem('dsa2_solved')||'{}');
let activeLang = 'python';
let activeFilter = 'all';
let searchQuery = '';
 
function countSolved(lv){ return Q.filter(q=>q.level===lv&&solved[q.id]).length; }
function updateProgress(){
  const tot=Object.keys(solved).filter(k=>solved[k]).length;
  document.getElementById('progTxt').textContent=`${tot} / ${Q.length}`;
  document.getElementById('progFill').style.width=`${(tot/Q.length)*100}%`;
  document.getElementById('sE').textContent=countSolved('easy');
  document.getElementById('sM').textContent=countSolved('medium');
  document.getElementById('sH').textContent=countSolved('hard');
}
 
function buildCard(q){
  const s=solved[q.id];
  const d=document.createElement('div');
  d.className=`card ${q.level} ${s?'solved':''}`;
  d.dataset.id=q.id; d.dataset.lv=q.level;
 
  const stepsHtml=q.steps.map((t,i)=>`<li data-n="${i+1}">${t}</li>`).join('');
  const code=q[activeLang]||(q.python||'// See other language tabs');
 
  d.innerHTML=`
    <div class="card-top">
      <div class="card-row1">
        <span class="lc-num">LC #${q.lc}</span>
        <span class="card-title">${q.title}</span>
        <span class="card-check">${s?'✓':''}</span>
      </div>
      <div class="card-row2">
        ${q.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
        <a class="lc-link" href="https://leetcode.com/problems/${q.lcSlug}/" target="_blank" onclick="event.stopPropagation()">
          LeetCode ↗
        </a>
      </div>
    </div>
    <div class="card-panel">
      <div class="panel-inner">
        <div class="tabs">
          <button class="tab active" onclick="switchTab(event,'logic',${q.id})">💡 Logic</button>
          <button class="tab" onclick="switchTab(event,'code',${q.id})">{'</>'} Code</button>
        </div>
        <div class="tab-content active" id="logic-${q.id}">
          <div class="approach-box">${q.approach}</div>
          <div class="step-label">Step-by-Step Thinking</div>
          <ol class="steps">${stepsHtml}</ol>
          <div class="cx-row">
            <span class="cx"><b>Time:</b> ${q.time}</span>
            <span class="cx"><b>Space:</b> ${q.space}</span>
          </div>
        </div>
        <div class="tab-content" id="code-${q.id}">
          <div class="code-block">
            <div class="code-header">
              <span class="code-lang">${activeLang}</span>
              <button class="copy-btn" onclick="copyCode(event,${q.id})">Copy</button>
            </div>
            <pre id="pre-${q.id}">${escHtml(code)}</pre>
          </div>
        </div>
        <button class="solve-btn" onclick="toggleSolved(event,${q.id})">
          ${s?'✅ Solved! Click to undo':'Mark as Solved ✓'}
        </button>
      </div>
    </div>`;
 
  d.querySelector('.card-top').addEventListener('click', ()=>d.classList.toggle('open'));
  return d;
}
 
function escHtml(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
 
function switchTab(e,tab,id){
  e.stopPropagation();
  const panel=e.target.closest('.panel-inner');
  panel.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  panel.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById(`${tab}-${id}`).classList.add('active');
}
 
function copyCode(e,id){
  e.stopPropagation();
  const q=Q.find(x=>x.id===id);
  const code=q[activeLang]||q.python||'';
  navigator.clipboard.writeText(code).then(()=>{
    e.target.textContent='Copied!';
    setTimeout(()=>e.target.textContent='Copy',1500);
  });
}
 
function toggleSolved(e,id){
  e.stopPropagation();
  solved[id]=!solved[id];
  localStorage.setItem('dsa2_solved',JSON.stringify(solved));
  render(); updateProgress();
}
 
function render(){
  const container=document.getElementById('container');
  container.innerHTML='';
  const levels=[
    {key:'easy',label:'🟢 Easy — 100 Problems',badge:'easy'},
    {key:'medium',label:'🟡 Medium — 30 Problems',badge:'medium'},
    {key:'hard',label:'🔴 Hard — 30 Problems',badge:'hard'},
  ];
  levels.forEach(({key,label,badge})=>{
    if(activeFilter!=='all'&&activeFilter!==key) return;
    const filtered=Q.filter(q=>{
      if(q.level!==key) return false;
      if(searchQuery){
        const lcNum=`${q.lc}`;
        return q.title.toLowerCase().includes(searchQuery)||lcNum.includes(searchQuery)||q.tags.some(t=>t.toLowerCase().includes(searchQuery));
      }
      return true;
    });
    if(!filtered.length) return;
    const sec=document.createElement('div');
    sec.className='section';
    sec.innerHTML=`<div class="section-head"><span class="section-title">${label}</span><span class="sec-badge ${badge}">${filtered.length} problems</span></div><div class="grid" id="g-${key}"></div>`;
    container.appendChild(sec);
    const grid=sec.querySelector(`#g-${key}`);
    filtered.forEach(q=>grid.appendChild(buildCard(q)));
  });
}
 
// Controls
document.querySelectorAll('.filter-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); activeFilter=b.dataset.f; render();
  });
});
 
document.querySelectorAll('.lang-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); activeLang=b.dataset.lang; render();
  });
});
 
document.getElementById('srch').addEventListener('input',e=>{
  searchQuery=e.target.value.toLowerCase().trim(); render();
});
 
render(); updateProgress();
</script>
</body>
</html>
